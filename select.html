<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Route - Bus Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar bg-primary navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Bus Tracker</a>
    </div>
  </nav>
  <div class="container mt-4">
    <h2>Select Route</h2>
    <div class="mb-3">
      <label for="routeSelect" class="form-label">Choose a Bus Route</label>
      <select class="form-select" id="routeSelect">
        <option selected disabled>Select route...</option>
        <option value="1">Route 1 - Downtown Loop</option>
        <option value="2">Route 2 - Uptown Express</option>
        <option value="3">Route 3 - Suburb Connector</option>
      </select>
    </div>
    <button id="searchBtn" class="btn btn-primary">Search</button>
  </div>
<script>
  document.getElementById('searchBtn').addEventListener('click',()=>{
    const route = document.getElementById('routeSelect').value;
    if(!route){
      alert('Please select a route');
      return;
    }
    window.location.href=`track.html?route=${route}`;
  });
</script>
</body>
</html>
